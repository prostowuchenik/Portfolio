<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Віртуальне портфоліо — шаблон</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <style>
      html, body { margin:0; height:100%; overflow:hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      /* Темна панель опису по центру екрана */
      #infoPanel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(1500px, calc(100vw - 32px)); /* Ширину збільшено до 900px для горизонтальних робіт */
        max-height: calc(100vh - 48px); 
        background: rgba(18, 18, 18, 0.86);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 14px 14px 12px 14px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        display: none;
        z-index: 10;
        backdrop-filter: blur(6px);
        flex-direction: column;
      }

      /* Стилі для зображення */
      #infoPanel img {
        width: 100%;
        height: auto; /* Забезпечує коректний розрахунок пропорцій */
        max-height: calc(100vh - 280px); 
        object-fit: contain;
        border-radius: 8px;
        margin-bottom: 12px;
        display: none; 
        flex-shrink: 0; 
      }

      /* --- НОВИЙ БЛОК: Текст та темний скроллбар --- */
      #infoTextContainer {
        overflow-y: auto; /* Скроллбар з'явиться ТІЛЬКИ тут, під картинкою */
        padding-right: 8px; /* Відступ, щоб скроллбар не налізав на літери */
        scrollbar-width: thin; /* Для Firefox */
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
      }

      /* Кастомний темний скроллбар для Chrome/Edge/Safari */
      #infoTextContainer::-webkit-scrollbar {
        width: 6px;
      }
      #infoTextContainer::-webkit-scrollbar-track {
        background: transparent;
      }
      #infoTextContainer::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }
      #infoTextContainer::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      /* налаштування розміру тексту */
      
      /* 1. Головна назва роботи (напр. "Інтер'єр моєї мрії") */
      #infoTextContainer h3 { 
        margin: 0 0 8px 0; 
        font-size: 24px; /* Збільшіть або зменшіть цю цифру (було 22px) */
        line-height: 1.2; 
      }

      /* 2. Інформація про автора та матеріали (напр. "Золотопуп Станіслав · 2025...") */
      #infoTextContainer .meta { 
        opacity: 1; 
        font-size: 20px; /* Розмір тексту підзаголовка */
        margin-bottom: 14px;
      }

      /* 3. Основний довгий текст (напр. "Еко-стиль. Використання...") */
      #infoTextContainer .desc { 
        font-size: 23px; /* Розмір основного тексту (було 14px) */
        line-height: 1.5; /* Міжрядковий інтервал для зручності читання */
        white-space: pre-wrap; 
      }

      #infoPanel .closeRow { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom: 10px; }
      #infoPanel button {
        appearance:none; border:0; padding: 6px 10px; border-radius: 10px;
        background: rgba(255,255,255,0.14); color:#fff; cursor:pointer;
      }
      #hint {
        position: fixed;
        left: 16px;
        bottom: 16px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.88);
        color: #111;
        font-size: 13px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        z-index: 10;
        max-width: min(520px, calc(100vw - 32px));
      }
      #hint code { background: rgba(0,0,0,0.08); padding: 1px 6px; border-radius: 8px; }
      a-scene { height: 100vh; width: 100vw; }
    </style>
  </head>

  <body>
    <div id="infoPanel" aria-live="polite">
      <img id="infoImage" src="" alt="Artwork">
      
      <div id="infoTextContainer">
        <h3 id="infoTitle">—</h3>
        <div class="meta" id="infoMeta">—</div>
        <div class="desc" id="infoDesc">—</div>
      </div>
    </div>

    <div id="hint" style="cursor: pointer;" title="Натисніть, щоб згорнути/розгорнути">
      <div id="hint-full">
        Керування: <code>W A S D</code> — рух, <code>миша</code> — огляд.<br/>
        <code>Лівий клік</code> по роботі — опис, <code>правий клік</code> — сховати опис.
      </div>
      <div id="hint-collapsed" style="display: none; font-weight: 600; text-align: center;">
        ⚙️
      </div>
    </div>

    <a-scene renderer="colorManagement: true; physicallyCorrectLights: true" background="color: #101010">
      
      <a-entity id="rig" position="0 0 0">
        <a-camera id="camera"
                  position="0 1.65 0"
                  wasd-controls="acceleration: 32"
                  look-controls="pointerLockEnabled: true"
                  wall-collider>
          /* налаштування прицілу */
          <a-entity cursor="fuse: false"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.004; radiusOuter: 0.015"
                    material="color: white; shader: flat; opacity: 0.6; transparent: true"
                    raycaster="objects: .clickable; far: 20"
                    auto-hide-cursor="timeout: 1000; deadzone: 15">
        </a-camera>
      </a-entity>

      <a-entity id="lights"></a-entity>
      <a-entity id="room" position="0 0 0"></a-entity>

    </a-scene>

    <script type="module" src="./app.js"></script>
  </body>
</html>
